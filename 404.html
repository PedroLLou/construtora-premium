<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada | Construtora Premium</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0B111F">
<link rel="icon" type="image/png" href="/img/logo-construtora-premium-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Archivo',sans-serif;background:#0B111F;color:#EDEBE4;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:32px;-webkit-font-smoothing:antialiased;
}
.box{max-width:560px;display:flex;flex-direction:column;align-items:center;gap:20px}
.box img{width:64px;height:64px;object-fit:contain}
.codigo{font-family:'Marcellus',serif;font-size:72px;color:#E3A63B;line-height:1}
h1{font-family:'Marcellus',serif;font-weight:400;font-size:28px;line-height:1.3}
p{color:rgba(237,235,228,.65);font-size:16px;line-height:1.7}
a.voltar{
  display:inline-block;margin-top:12px;padding:16px 36px;
  background:#E3A63B;color:#14100A;text-decoration:none;
  font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  transition:background .25s;
}
a.voltar:hover{background:#F0BA58}
</style>
</head>
<body>
<div class="box">
  <img src="/img/logo-construtora-premium-192.png" alt="Logo da Construtora Premium" width="192" height="192">
  <span class="codigo">404</span>
  <h1>Página não encontrada</h1>
  <p>O endereço que você acessou não existe ou foi movido. Volte para a página inicial e encontre nossos serviços, obras e contato.</p>
  <a class="voltar" href="/">Voltar para o início</a>
</div>
</body>
</html>
